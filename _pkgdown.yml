url: https://long39ng.github.io/animejs/

template:
  bootstrap: 5

reference:
  - title: Animations & Timelines
    desc: >
      Create a single animation, or initialise and build an animation
      timeline.
    contents:
      - anime_animate
      - anime_timeline
      - anime_add

  - title: Property Animations
    desc: >
      Describe how individual CSS or SVG properties change over time.
    contents:
      - anime_from_to
      - anime_keyframes

  - title: Stagger
    desc: >
      Distribute animation start times across multiple elements.
    contents:
      - anime_stagger

  - title: Easing
    desc: >
      Construct easing specifications for timeline defaults and per-segment
      overrides.
    contents:
      - starts_with("anime_easing")

  - title: Target Selectors
    desc: >
      Build CSS selector strings that identify the elements to animate.
    contents:
      - starts_with("anime_target")

  - title: Events
    desc: >
      Attach JavaScript callbacks to timeline lifecycle events.
    contents:
      - anime_on

  - title: Playback
    desc: >
      Control looping, direction, and interactive UI controls.
    contents:
      - anime_playback

  - title: Rendering
    desc: >
      Serialise an animation specification and produce an htmlwidget.
    contents:
      - anime_render
      - animejs_widget

  - title: Shiny
    desc: >
      Use animejs widgets in Shiny applications.
    contents:
      - animejs-shiny

articles:
  - title: Examples
    navbar: ~
    contents:
      - articles/rowing-stroke
  - title: ~
    contents:
      - articles/dezim-logo
